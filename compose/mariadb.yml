services:
  mariadb:
    image: mariadb:11.8
    environment:
      MARIADB_ROOT_PASSWORD: mariadb
      MARIADB_DATABASE: drizzle
      TZ: UTC
    ports:
      - "33306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 40
      start_period: 10s
